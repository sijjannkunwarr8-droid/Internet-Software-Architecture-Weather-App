<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER APP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="card">
    <div class="search">
        <input type="text" placeholder="Enter the City Name" spellcheck="false">
        <button><img src="search icon.webp" alt="Search"></button>
    </div>
    <div class="weather">
        <img src="weathericon.webp" class="weathericon" alt="Weather Icon">
        <h2 class="city">City Name</h2>
        <h1 class="temp">22°C</h1>    
        <h3 class="time">Local Time: --:--</h3>
        <div class="details">
            <div class="col">
                <img src="humidity.webp" alt="Humidity">
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="wind.webp" alt="Wind">
                <div>
                    <p class="wind">15km/hr</p>
                    <p>Wind Speed</p>
                </div>
            </div>
            <div class="col"> 
                <img src="air pressure icon.webp" alt="Air Pressure"> 
                <div>
                    <p class="pressure">1000hPa</p>
                    <p>Air Pressure</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<footer><b>© 2025 Sijan Kunwar. All rights reserved</b></footer>
</body>
</html>
